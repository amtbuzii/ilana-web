services:
  - type: web
    name: ilana-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: ""   # fill in your Vercel URL after first deploy, e.g. https://ilana.vercel.app
    plan: free
